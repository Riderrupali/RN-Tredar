name: Android Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Generate Android project
        run: |
          rm -rf android/
          flutter create --platforms android .

      - name: Fix Kotlin + AGP + jcenter (auto patch)
        run: |
          python3 - << 'EOF'
          import os, re, glob
          
          # settings.gradle किंवा .kts दोन्ही शोधणे
          targets = glob.glob("android/settings.gradle*")
          KOTLIN, AGP = "1.9.25", "8.9.1" 
          
          def patch(path):
              if not os.path.exists(path): return
              txt = open(path).read()
              # Kotlin version
              txt = re.sub(r'''(id\s*[\(]?\s*['"]org\.jetbrains\.kotlin\.android['"]\s*[\)]?\s+version\s+)['"][^'"]*['"]''', lambda m: m.group(1) + f'"{KOTLIN}"', txt)
              # AGP version
              txt = re.sub(r'''(id\s*[\(]?\s*['"]com\.android\.application['"]\s*[\)]?\s+version\s+)['"][^'"]*['"]''', lambda m: m.group(1) + f'"{AGP}"', txt)
              # Remove jcenter
              txt = txt.replace("jcenter()", "// jcenter() removed")
              open(path, 'w').write(txt)
              print(f"PATCHED: {path}")

          # सर्व फाईल्सना पॅच करा
          for f in targets + glob.glob("android/build.gradle*") + glob.glob("android/app/build.gradle*"):
              patch(f)
          EOF

      - name: Build Release APK
        run: flutter build apk --release --no-tree-shake-icons --android-skip-build-dependency-validation
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
          
