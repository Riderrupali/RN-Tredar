name: Flutter Android Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.9'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Generate Android folder
        run: flutter create --platforms android --project-name rn_tredar .

      - name: Disable R8 and Patch Gradle
        run: |
          python3 - << 'EOF'
          import os
          # .gradle आणि .gradle.kts दोन्ही तपासण्यासाठी
          files = ['android/app/build.gradle', 'android/app/build.gradle.kts']
          for path in files:
              if os.path.exists(path):
                  with open(path, 'r') as f:
                      content = f.read()
                  
                  # R8 आणि Minification डिसेबल करणे
                  content = content.replace('minifyEnabled true', 'minifyEnabled false')
                  content = content.replace('shrinkResources true', 'shrinkResources false')
                  
                  with open(path, 'w') as f:
                      f.write(content)
                  print(f"✅ {path} patched")
          EOF

      - name: Build APK
        run: flutter build apk --release --android-skip-build-dependency-validation

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
          
