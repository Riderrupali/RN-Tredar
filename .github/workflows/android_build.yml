name: Flutter Android Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Generate Android folder
        run: flutter create --platforms android --project-name rn_tredar .

      - name: Disable R8 minification
        run: |
          python3 << 'EOF'
          import re

          with open('android/app/build.gradle', 'r') as f:
              content = f.read()

          # release buildType मध्ये minifyEnabled false add करा
          content = re.sub(
              r'(buildTypes\s*\{[^}]*release\s*\{)',
              r'\1\n            minifyEnabled false\n            shrinkResources false',
              content,
              flags=re.DOTALL
          )

          with open('android/app/build.gradle', 'w') as f:
              f.write(content)

          print("✅ minifyEnabled false added successfully")
          EOF

      - name: Build APK
        run: flutter build apk --release --android-skip-build-dependency-validation

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
