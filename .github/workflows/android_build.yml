name: Flutter Android Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.3'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Fix speech_to_text build.gradle
        run: |
          python3 << 'EOF'
          import glob, os

          pattern = os.path.expanduser('~/.pub-cache/hosted/pub.dev/speech_to_text*/android/build.gradle')
          files = glob.glob(pattern)
          print(f"Found: {files}")

          replacements = {
              'flutter.compileSdkVersion': '35',
              'flutter.compileSdk': '35',
              'flutter.minSdkVersion': '21',
              'flutter.minSdk': '21',
              'flutter.targetSdkVersion': '34',
              'flutter.targetSdk': '34',
              'flutter.ndkVersion': '"25.1.8937393"',
          }

          for f in files:
              with open(f, 'r') as fp:
                  content = fp.read()
              for old, new in replacements.items():
                  content = content.replace(old, new)
              with open(f, 'w') as fp:
                  fp.write(content)
              print(f"✅ Patched: {f}")
              print(content[:400])
          EOF

      - name: Generate Android folder
        run: flutter create --platforms android --project-name rn_tredar .

      - name: Disable R8 minification
        run: |
          python3 << 'EOF'
          import re
          with open('android/app/build.gradle', 'r') as f:
              content = f.read()
          content = re.sub(
              r'(release\s*\{)',
              'release {\n            minifyEnabled false\n            shrinkResources false',
              content
          )
          with open('android/app/build.gradle', 'w') as f:
              f.write(content)
          print("✅ minifyEnabled false added")
          EOF

      - name: Build APK
        run: flutter build apk --release --android-skip-build-dependency-validation

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
