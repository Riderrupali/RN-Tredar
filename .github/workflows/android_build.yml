name: Android Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Generate Android project
        run: flutter create --platforms android .

      - name: Fix all compatibility issues
        run: |
          python3 - << 'EOF'
          import re, os, subprocess

          KOTLIN = "2.2.20"
          AGP    = "8.11.1"

          # ── 1. Patch project's own gradle files ─────────────────────────────
          def patch_project_file(path):
              if not os.path.exists(path):
                  return
              txt = open(path).read()
              orig = txt

              # Kotlin plugin version
              txt = re.sub(
                  r'''(id\s*[\(]?\s*['"]org\.jetbrains\.kotlin\.android['"]\s*[\)]?\s+version\s+)['"][^'"]*['"]''',
                  lambda m: m.group(1) + f'"{KOTLIN}"', txt)

              # AGP com.android.application version
              txt = re.sub(
                  r'''(id\s*[\(]?\s*['"]com\.android\.application['"]\s*[\)]?\s+version\s+)['"][^'"]*['"]''',
                  lambda m: m.group(1) + f'"{AGP}"', txt)

              # Remove jcenter
              txt = txt.replace("jcenter()", "// jcenter() removed")

              if txt != orig:
                  open(path, 'w').write(txt)
                  print(f"  [PATCHED] {path}")
              else:
                  print(f"  [same]    {path}")

          print("=== Patching project files ===")
          for f in [
              "android/settings.gradle",     "android/settings.gradle.kts",
              "android/build.gradle",         "android/build.gradle.kts",
              "android/app/build.gradle",     "android/app/build.gradle.kts",
          ]:
              patch_project_file(f)

          # ── 2. Patch ALL plugin build.gradle files in pub-cache ─────────────
          print("\n=== Patching plugin build.gradle files ===")

          pub_cache = os.path.expanduser("~/.pub-cache")
          result = subprocess.run(
              ["find", pub_cache, "-name", "build.gradle"],
              capture_output=True, text=True)
          plugin_files = [p for p in result.stdout.strip().split("\n") if p and os.path.exists(p)]

          fixed = 0
          for path in plugin_files:
              txt = open(path).read()
              orig = txt

              # Remove jcenter
              txt = txt.replace("jcenter()", "mavenCentral()")

              # Replace old AGP classpath (e.g. 7.3.0, 7.x.x, 4.x.x)
              txt = re.sub(
                  r"""(classpath\s+['"]com\.android\.tools\.build:gradle:)[^'"]+(['"])""",
                  lambda m: m.group(1) + AGP + m.group(2), txt)

              # Replace old kotlin_version in ext block
              txt = re.sub(
                  r"""(ext\.kotlin_version\s*=\s*)['"][^'"]*['"]""",
                  lambda m: m.group(1) + f'"{KOTLIN}"', txt)

              # Replace kotlin-gradle-plugin version in classpath
              txt = re.sub(
                  r"""(classpath\s+['"]org\.jetbrains\.kotlin:kotlin-gradle-plugin:)[^'"]+(['"])""",
                  lambda m: m.group(1) + KOTLIN + m.group(2), txt)

              # Ensure mavenCentral() is present if google() is there but mavenCentral() is not
              if "google()" in txt and "mavenCentral()" not in txt:
                  txt = txt.replace("google()", "google()\n        mavenCentral()")

              if txt != orig:
                  open(path, 'w').write(txt)
                  plugin_name = path.split("pub.dev/")[1].split("/")[0] if "pub.dev/" in path else path
                  print(f"  [PATCHED] {plugin_name}")
                  fixed += 1

          print(f"\n✅ Patched {fixed} plugin gradle file(s)")

          # ── 3. Show final settings file ──────────────────────────────────────
          for sg in ["android/settings.gradle.kts", "android/settings.gradle"]:
              if os.path.exists(sg):
                  print(f"\n=== Final {sg} ===")
                  print(open(sg).read())
                  break

          EOF

      - name: Build Release APK
        run: flutter build apk --release --android-skip-build-dependency-validation

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
