name: Flutter Android Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Generate Android project
        run: flutter create --platforms android .

      - name: Disable R8 and Apply Proguard Rules
        run: |
          # R8 बंद करणे
          echo "android.enableR8=false" >> android/gradle.properties
          echo "android.enableR8.fullMode=false" >> android/gradle.properties
          
          # ML Kit Proguard Rules ॲड करणे
          mkdir -p android/app
          cat >> android/app/proguard-rules.pro << 'EOF'
          -keep class com.google.mlkit.vision.text.** { *; }
          -keep class com.google.mlkit.vision.text.chinese.** { *; }
          -keep class com.google.mlkit.vision.text.devanagari.** { *; }
          -keep class com.google.mlkit.vision.text.japanese.** { *; }
          -keep class com.google.mlkit.vision.text.korean.** { *; }
          EOF

      - name: Fix Compatibility Issues
        run: |
          python3 - << 'EOF'
          import re, os, subprocess

          KOTLIN = "2.2.20"
          AGP    = "8.11.1"

          # Gradle फाइल्स पॅच करणे
          for f in ["android/settings.gradle", "android/settings.gradle.kts", "android/build.gradle", "android/build.gradle.kts", "android/app/build.gradle", "android/app/build.gradle.kts"]:
              if os.path.exists(f):
                  txt = open(f).read()
                  txt = txt.replace("jcenter()", "mavenCentral()")
                  open(f, 'w').write(txt)

          # प्लगिन्सचे ग्रेडल्स पॅच करणे
          pub_cache = os.path.expanduser("~/.pub-cache")
          result = subprocess.run(["find", pub_cache, "-name", "build.gradle"], capture_output=True, text=True)
          for path in result.stdout.strip().split("\n"):
              if path and os.path.exists(path):
                  txt = open(path).read()
                  txt = txt.replace("jcenter()", "mavenCentral()")
                  txt = re.sub(r"""(classpath\s+['"]com\.android\.tools\.build:gradle:)[^'"]+(['"])""", lambda m: m.group(1) + AGP + m.group(2), txt)
                  open(path, 'w').write(txt)
          EOF

      - name: Build APK
        run: flutter build apk --release --android-skip-build-dependency-validation

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          
