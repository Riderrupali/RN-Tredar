name: Android Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Flutter 3.24.0 = last stable with V1 embedding (Registrar) support
      # speech_to_text 6.6.2 needs this — do NOT use latest Flutter
      - name: Set up Flutter 3.24.0
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Flutter version check
        run: flutter --version

      - name: Flutter pub get
        run: flutter pub get

      - name: Generate Android project
        run: flutter create --platforms android .

      - name: Create assets folder
        run: mkdir -p assets

      - name: Fix jcenter in plugin build.gradle files
        run: |
          python3 - << 'EOF'
          import re, os, subprocess

          KOTLIN = "1.9.25"
          AGP    = "8.1.0"
          PUB    = os.path.expanduser("~/.pub-cache")

          # ── 1. Patch PROJECT gradle files ────────────────────────────────────
          def patch_project(path):
              if not os.path.exists(path): return
              txt = open(path).read(); orig = txt
              txt = re.sub(
                  r'''(id\s*[\(]?\s*['"]org\.jetbrains\.kotlin\.android['"]\s*[\)]?\s+version\s+)['"][^'"]*['"]''',
                  lambda m: m.group(1) + f'"{KOTLIN}"', txt)
              txt = re.sub(
                  r'''(id\s*[\(]?\s*['"]com\.android\.application['"]\s*[\)]?\s+version\s+)['"][^'"]*['"]''',
                  lambda m: m.group(1) + f'"{AGP}"', txt)
              txt = txt.replace("jcenter()", "// jcenter() removed")
              if txt != orig:
                  open(path,'w').write(txt); print(f"  [PATCHED] {path}")
              else:
                  print(f"  [same]    {path}")

          print("=== Patching project gradle files ===")
          for f in ["android/settings.gradle","android/settings.gradle.kts",
                    "android/build.gradle","android/build.gradle.kts",
                    "android/app/build.gradle","android/app/build.gradle.kts"]:
              patch_project(f)

          # ── 2. Plugin build.gradle — ONLY jcenter → mavenCentral ─────────────
          # DO NOT touch plugin AGP/Kotlin versions or .kt source files!
          print("\n=== Fixing jcenter in plugin build.gradle files ===")
          r = subprocess.run(["find", PUB, "-name","build.gradle"],
                             capture_output=True, text=True)
          fixed = 0
          for path in [p for p in r.stdout.strip().split("\n") if p and os.path.exists(p)]:
              txt = open(path).read(); orig = txt
              txt = txt.replace("jcenter()", "mavenCentral()")
              if "google()" in txt and "mavenCentral()" not in txt:
                  txt = txt.replace("google()", "google()\n        mavenCentral()")
              if txt != orig:
                  open(path,'w').write(txt)
                  label = path.split("pub.dev/")[1].split("/")[0] if "pub.dev/" in path else path
                  print(f"  [fixed] {label}"); fixed += 1
          print(f"  ✅ {fixed} plugin(s) fixed")

          # ── 3. Show final settings file ───────────────────────────────────────
          for sg in ["android/settings.gradle.kts","android/settings.gradle"]:
              if os.path.exists(sg):
                  print(f"\n=== {sg} ==="); print(open(sg).read()); break
          EOF

      - name: Build Release APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
