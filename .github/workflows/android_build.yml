name: Android Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Flutter 3.24.0 = last stable with V1 embedding (Registrar) support
      - name: Set up Flutter 3.24.0
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      # flutter_tts 4.2.5 needs Kotlin 2.2+ — pin to 4.0.2 (Kotlin 1.9 compatible)
      - name: Pin flutter_tts to 4.0.2 (Kotlin 1.9 compatible)
        run: |
          sed -i 's/flutter_tts:.*$/flutter_tts: 4.0.2/' pubspec.yaml
          echo "flutter_tts version pinned:"
          grep 'flutter_tts' pubspec.yaml

      - name: Flutter pub get
        run: flutter pub get

      - name: Generate Android project
        run: flutter create --platforms android --project-name code_magic_app .

      - name: Create assets folder
        run: mkdir -p assets

      - name: Fix Gradle + compileSdk + jcenter
        run: |
          python3 - << 'EOF'
          import re, os, subprocess

          KOTLIN  = "1.9.25"
          AGP     = "8.1.0"
          GRADLE  = "8.4"
          PUB     = os.path.expanduser("~/.pub-cache")

          # ── 1. Fix gradle-wrapper.properties ─────────────────────────────────
          wrapper = "android/gradle/wrapper/gradle-wrapper.properties"
          if os.path.exists(wrapper):
              txt = open(wrapper).read()
              txt = re.sub(r'distributionUrl=.*',
                           f'distributionUrl=https\\\\://services.gradle.org/distributions/gradle-{GRADLE}-bin.zip',
                           txt)
              open(wrapper, 'w').write(txt)
              print(f"  [PATCHED] gradle wrapper → Gradle {GRADLE}")

          # ── 2. Patch PROJECT gradle files ────────────────────────────────────
          def patch_project(path):
              if not os.path.exists(path): return
              txt = open(path).read(); orig = txt
              txt = re.sub(
                  r'''(id\s*[\(]?\s*['"]org\.jetbrains\.kotlin\.android['"]\s*[\)]?\s+version\s+)['"][^'"]*['"]''',
                  lambda m: m.group(1) + f'"{KOTLIN}"', txt)
              txt = re.sub(
                  r'''(id\s*[\(]?\s*['"]com\.android\.application['"]\s*[\)]?\s+version\s+)['"][^'"]*['"]''',
                  lambda m: m.group(1) + f'"{AGP}"', txt)
              txt = txt.replace("jcenter()", "// jcenter() removed")
              if txt != orig:
                  open(path,'w').write(txt); print(f"  [PATCHED] {path}")
              else:
                  print(f"  [same]    {path}")

          print("\n=== Patching project gradle files ===")
          for f in ["android/settings.gradle","android/settings.gradle.kts",
                    "android/build.gradle","android/build.gradle.kts",
                    "android/app/build.gradle","android/app/build.gradle.kts"]:
              patch_project(f)

          # ── 3. Set compileSdk = 35 in app/build.gradle ───────────────────────
          app_bg = "android/app/build.gradle"
          if os.path.exists(app_bg):
              txt = open(app_bg).read(); orig = txt
              txt = re.sub(r'compileSdk\s*=?\s*\d+', 'compileSdk = 35', txt)
              txt = re.sub(r'compileSdkVersion\s*\d+', 'compileSdkVersion 35', txt)
              if txt != orig:
                  open(app_bg,'w').write(txt)
                  print("  [PATCHED] compileSdk = 35")
              else:
                  print("  [same]    compileSdk (already 35 or not found)")

          # ── 4. Plugin build.gradle — ONLY jcenter → mavenCentral ─────────────
          print("\n=== Fixing jcenter in plugin build.gradle files ===")
          r = subprocess.run(["find", PUB, "-name","build.gradle"],
                             capture_output=True, text=True)
          fixed = 0
          for path in [p for p in r.stdout.strip().split("\n") if p and os.path.exists(p)]:
              txt = open(path).read(); orig = txt
              txt = txt.replace("jcenter()", "mavenCentral()")
              if "google()" in txt and "mavenCentral()" not in txt:
                  txt = txt.replace("google()", "google()\n        mavenCentral()")
              if txt != orig:
                  open(path,'w').write(txt)
                  label = path.split("pub.dev/")[1].split("/")[0] if "pub.dev/" in path else path
                  print(f"  [fixed] {label}"); fixed += 1
          print(f"  ✅ {fixed} plugin(s) fixed")
          EOF

      # R8 strips mlkit language classes not bundled → add dontwarn rules
      - name: Add ProGuard dontwarn rules for MLKit language models
        run: |
          PROGUARD="android/app/proguard-rules.pro"
          cat >> "$PROGUARD" << 'RULES'

          # MLKit language-specific text recognizers (not bundled in Latin-only builds)
          -dontwarn com.google.mlkit.vision.text.chinese.**
          -dontwarn com.google.mlkit.vision.text.devanagari.**
          -dontwarn com.google.mlkit.vision.text.japanese.**
          -dontwarn com.google.mlkit.vision.text.korean.**
          RULES
          echo "ProGuard rules added:"
          cat "$PROGUARD"

      - name: Build Release APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
