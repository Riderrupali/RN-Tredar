name: Flutter Android Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Fix speech_to_text plugin build.gradle
        run: |
          PLUGIN_DIR=$(find $HOME/.pub-cache/hosted/pub.dev -name "speech_to_text*" -type d | head -1)
          GRADLE_FILE="$PLUGIN_DIR/android/build.gradle"
          if [ -f "$GRADLE_FILE" ]; then
            sed -i 's/flutter\.compileSdkVersion/35/g' "$GRADLE_FILE"
            sed -i 's/flutter\.minSdkVersion/21/g' "$GRADLE_FILE"
            sed -i 's/flutter\.targetSdkVersion/34/g' "$GRADLE_FILE"
            echo "✅ speech_to_text build.gradle patched"
          fi

      - name: Generate Android folder
        run: flutter create --platforms android --project-name rn_tredar .

      - name: Disable R8 minification
        run: |
          python3 << 'EOF'
          import re
          with open('android/app/build.gradle', 'r') as f:
              content = f.read()
          content = re.sub(
              r'(release\s*\{)',
              'release {\n            minifyEnabled false\n            shrinkResources false',
              content
          )
          with open('android/app/build.gradle', 'w') as f:
              f.write(content)
          print("✅ minifyEnabled false added")
          EOF

      - name: Build APK
        run: flutter build apk --release --android-skip-build-dependency-validation

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
