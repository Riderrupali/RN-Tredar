name: Android Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Generate Android project
        run: flutter create --platforms android .

      # नवीन Proguard Rules साठीची स्टेप
      - name: Fix ML Kit R8 Proguard Rules
        run: |
          mkdir -p android/app
          cat >> android/app/proguard-rules.pro << 'EOF'
          -keep class com.google.mlkit.vision.text.** { *; }
          -keep class com.google.mlkit.vision.text.chinese.** { *; }
          -keep class com.google.mlkit.vision.text.devanagari.** { *; }
          -keep class com.google.mlkit.vision.text.japanese.** { *; }
          -keep class com.google.mlkit.vision.text.korean.** { *; }
          EOF

      - name: Fix all compatibility issues
        run: |
          python3 - << 'EOF'
          import re, os, subprocess

          KOTLIN = "2.2.20"
          AGP    = "8.11.1"

          def patch_project_file(path):
              if not os.path.exists(path): return
              txt = open(path).read()
              orig = txt
              txt = re.sub(r'''(id\s*[\(]?\s*['"]org\.jetbrains\.kotlin\.android['"]\s*[\)]?\s+version\s+)['"][^'"]*['"]''', lambda m: m.group(1) + f'"{KOTLIN}"', txt)
              txt = re.sub(r'''(id\s*[\(]?\s*['"]com\.android\.application['"]\s*[\)]?\s+version\s+)['"][^'"]*['"]''', lambda m: m.group(1) + f'"{AGP}"', txt)
              txt = txt.replace("jcenter()", "// jcenter() removed")
              if txt != orig: open(path, 'w').write(txt)

          for f in ["android/settings.gradle", "android/settings.gradle.kts", "android/build.gradle", "android/build.gradle.kts", "android/app/build.gradle", "android/app/build.gradle.kts"]:
              patch_project_file(f)

          pub_cache = os.path.expanduser("~/.pub-cache")
          result = subprocess.run(["find", pub_cache, "-name", "build.gradle"], capture_output=True, text=True)
          for path in result.stdout.strip().split("\n"):
              if path and os.path.exists(path):
                  txt = open(path).read()
                  orig = txt
                  txt = txt.replace("jcenter()", "mavenCentral()")
                  txt = re.sub(r"""(classpath\s+['"]com\.android\.tools\.build:gradle:)[^'"]+(['"])""", lambda m: m.group(1) + AGP + m.group(2), txt)
                  txt = re.sub(r"""(ext\.kotlin_version\s*=\s*)['"][^'"]*['"]""", lambda m: m.group(1) + f'"{KOTLIN}"', txt)
                  txt = re.sub(r"""(classpath\s+['"]org\.jetbrains\.kotlin:kotlin-gradle-plugin:)[^'"]+(['"])""", lambda m: m.group(1) + KOTLIN + m.group(2), txt)
                  if txt != orig: open(path, 'w').write(txt)
          EOF

      - name: Build Release APK
        run: flutter build apk --release --android-skip-build-dependency-validation

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
          
