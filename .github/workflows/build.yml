name: Build Android APK
on:
  push:
    branches:
      - main  # तुझी ब्रांचचे नाव (जर 'master' असेल तर तिथे 'master' लिही)

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          
      - name: Check Secret
        run: echo "Token length is ${{ secrets.EXPO_TOKEN != '' && 'present' || 'missing' }}"
        
      - name: Build APK
        run: eas build --platform android --non-interactive --profile preview
        
