name: Android Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Generate Android project
        run: flutter create --platforms android .

      - name: Fix Kotlin + AGP + jcenter (auto patch)
        run: |
          python3 - << 'EOF'
          import re, os, subprocess

          KOTLIN = "1.9.25"
          AGP    = "8.7.3"

          def patch(path):
              if not os.path.exists(path):
                  print(f"  [skip] {path}")
                  return
              txt = open(path).read()
              orig = txt

              # Kotlin version
              txt = re.sub(
                  r'''(id\s*[\(]?\s*['"]org\.jetbrains\.kotlin\.android['"]\s*[\)]?\s+version\s+)['"][^'"]*['"]''',
                  lambda m: m.group(1) + f'"{KOTLIN}"', txt)

              # ext.kotlin_version (old style)
              txt = re.sub(
                  r"""(ext\.kotlin_version\s*=\s*)['"][^'"]*['"]""",
                  lambda m: m.group(1) + f'"{KOTLIN}"', txt)

              # AGP com.android.application
              txt = re.sub(
                  r'''(id\s*[\(]?\s*['"]com\.android\.application['"]\s*[\)]?\s+version\s+)['"][^'"]*['"]''',
                  lambda m: m.group(1) + f'"{AGP}"', txt)

              # AGP classpath (old style)
              txt = re.sub(
                  r"""(com\.android\.tools\.build:gradle:)[^\s'"]+""",
                  lambda m: m.group(1) + AGP, txt)

              # Remove jcenter
              txt = txt.replace("jcenter()", "// jcenter() removed")

              if txt != orig:
                  open(path, 'w').write(txt)
                  print(f"  [PATCHED] {path}")
              else:
                  print(f"  [same]    {path}")

          # Patch project gradle files (.gradle AND .gradle.kts both)
          for f in [
              "android/settings.gradle",     "android/settings.gradle.kts",
              "android/build.gradle",         "android/build.gradle.kts",
              "android/app/build.gradle",     "android/app/build.gradle.kts",
          ]:
              patch(f)

          # Remove jcenter from ALL pub-cache plugin gradle files
          pub_cache = os.path.expanduser("~/.pub-cache")
          result = subprocess.run(
              ["find", pub_cache, "-name", "build.gradle"],
              capture_output=True, text=True)
          count = 0
          for path in result.stdout.strip().split("\n"):
              if path and os.path.exists(path):
                  txt = open(path).read()
                  if "jcenter()" in txt:
                      open(path, 'w').write(txt.replace("jcenter()", "// jcenter() removed"))
                      print(f"  [jcenter] {path}")
                      count += 1
          print(f"\n✅ Done — jcenter removed from {count} plugin(s)")

          # Print final settings file
          for sg in ["android/settings.gradle.kts", "android/settings.gradle"]:
              if os.path.exists(sg):
                  print(f"\n=== {sg} ===")
                  print(open(sg).read())
                  break
          EOF

      - name: Build Release APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
