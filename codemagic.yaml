workflows:
  android-release:
    name: Code Magic — Trading App Release
    max_build_duration: 60
    environment:
      flutter: 3.24.0
      java: 17

    scripts:
      - name: Generate and Patch Android Project
        script: |
          rm -rf android
          flutter create \
            --platforms android \
            --org com.codemagic \
            --project-name code_magic_app \
            .
          
          # 1. कोटलिन व्हर्जन फिक्स करा (हे सर्वात महत्त्वाचं आहे)
          sed -i 's/id "org.jetbrains.kotlin.android" version "[^"]*"/id "org.jetbrains.kotlin.android" version "1.9.25"/' android/settings.gradle || true
          echo "ext.kotlin_version=1.9.25" >> android/gradle.properties
          
          # 2. Manifest फिक्स करा (हे पण याच स्टेपमध्ये करत आहोत)
          cat > android/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.RECORD_AUDIO"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_MICROPHONE"/>
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32"/>
              <uses-permission android:name="android.permission.READ_MEDIA_IMAGES"/>
              <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW"/>
              <uses-permission android:name="android.permission.CAMERA"/>
              <application android:label="Code Magic" android:name="${applicationName}" android:icon="@mipmap/ic_launcher" android:enableOnBackInvokedCallback="true">
                  <activity android:name=".MainActivity" android:exported="true" android:launchMode="singleTop" android:taskAffinity="" android:theme="@style/LaunchTheme" android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode" android:hardwareAccelerated="true" android:windowSoftInputMode="adjustResize">
                      <meta-data android:name="io.flutter.embedding.android.NormalTheme" android:resource="@style/NormalTheme"/>
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <service android:name="com.geekyants.flutter_overlay_window.OverlayService" android:exported="false" android:foregroundServiceType="microphone"/>
                  <meta-data android:name="flutterEmbedding" android:value="2"/>
              </application>
          </manifest>
          EOF
          echo "✅ Project generated, Kotlin patched, and Manifest updated."

      - name: Setup signing
        script: |
          mkdir -p android/app/
          cp lib/keystore/code_magic.jks android/app/code_magic.jks
          cat > android/key.properties << 'EOF'
          storePassword=riderrupali@07
          keyPassword=riderrupali@07
          keyAlias=code_magic_key
          storeFile=code_magic.jks
          EOF
          cp android/key.properties android/app/key.properties

      - name: Flutter pub get
        script: flutter pub get

      - name: Build Release APK
        script: |
          flutter build apk --release --build-name=1.0.0 --build-number=1
          
