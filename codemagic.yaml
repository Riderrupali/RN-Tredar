workflows:
  android-release:
    name: Android Release Build
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Upgrade dependencies
        script: flutter pub upgrade

      - name: Get Flutter packages
        script: flutter pub get

      - name: Generate fresh Android project
        script: flutter create --platforms android .

      - name: Patch Kotlin and Gradle Config
        script: |
          # 1. Force Kotlin Version in settings.gradle
          python3 - <<'EOF'
          import re, os
          sg_path = "android/settings.gradle"
          if os.path.exists(sg_path):
              with open(sg_path, "r") as f: content = f.read()
              patched = re.sub(r'(id\s+["\']org\.jetbrains\.kotlin\.android["\']\s+version\s+)["\'][^"\']*["\']', r'\g<1>"1.9.25"', content)
              with open(sg_path, "w") as f: f.write(patched)
          EOF

          # 2. Force Resolution Strategy in build.gradle to fix 'Unit class' incompatibility
          cat >> android/app/build.gradle << 'EOF'
          configurations.all {
              resolutionStrategy {
                  eachDependency { details ->
                      if (details.requested.group == 'org.jetbrains.kotlin') {
                          details.useVersion '1.9.25'
                      }
                  }
              }
          }
          EOF

      - name: Build Release APK
        script: |
          flutter build apk --release --no-shrink
    artifacts:
      - build/**/outputs/**/*.apk
      - build/**/outputs/**/mapping.txt
      
