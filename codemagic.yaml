workflows:
  android-release:
    name: Android Release Build
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17

    scripts:
      - name: Flutter pub get
        script: flutter pub get

      - name: Generate fresh Android project
        script: flutter create --platforms android .

      - name: Fix all compatibility issues (Kotlin + jcenter + AGP)
        script: |
          echo "android.experimental.dependency.analysis.checkMode=none" >> android/gradle.properties
          cat > /tmp/fix_all.py << 'PYEOF'
          import re, os, subprocess
          KOTLIN_VERSION = "1.9.25"
          AGP_VERSION    = "8.3.2"
          project_files = ["android/settings.gradle", "android/settings.gradle.kts", "android/build.gradle", "android/build.gradle.kts", "android/app/build.gradle", "android/app/build.gradle.kts"]
          def patch_file(path):
              if not os.path.exists(path): return False
              with open(path, "r") as f: before = f.read()
              after = before
              after = re.sub(r'''(id\s+['"]org\.jetbrains\.kotlin\.android['"]\s+version\s+)['"][^'"]*['"]''', lambda m: m.group(1) + f'"{KOTLIN_VERSION}"', after)
              after = re.sub(r'''(id\s+['"]com\.android\.application['"]\s+version\s+)['"][^'"]*['"]''', lambda m: m.group(1) + f'"{AGP_VERSION}"', after)
              after = after.replace("jcenter()", "mavenCentral()")
              if after != before:
                  with open(path, "w") as f: f.write(after)
              return True
          for f in project_files: patch_file(f)
          pub_cache = os.path.expanduser("~/.pub-cache")
          result = subprocess.run(["find", pub_cache, "-name", "build.gradle"], capture_output=True, text=True)
          for path in result.stdout.strip().split("\n"):
              if not path: continue
              with open(path, "r") as f: content = f.read()
              if "jcenter()" in content:
                  with open(path, "w") as f: f.write(content.replace("jcenter()", "mavenCentral()"))
          PYEOF
          python3 /tmp/fix_all.py

      - name: Build Release APK
        script: flutter build apk --release --no-tree-shake-icons

    artifacts:
      - build/**/outputs/**/*.apk
      
