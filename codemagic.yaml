workflows:
  android-release:
    name: Android Release Build
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Upgrade dependencies
        script: flutter pub upgrade

      - name: Get Flutter packages
        script: flutter pub get

      - name: Generate fresh Android project
        script: flutter create --platforms android .

      - name: Update Kotlin Version to 2.2.0
        script: |
          python3 - <<'EOF'
          import re, os
          sg_path = "android/settings.gradle"
          if os.path.exists(sg_path):
              with open(sg_path, "r") as f: content = f.read()
              # कोटलिन व्हर्जन 2.2.0 वर सेट करत आहोत
              patched = re.sub(r'(id\s+["\']org\.jetbrains\.kotlin\.android["\']\s+version\s+)["\'][^"\']*["\']', r'\g<1>"2.2.0"', content)
              with open(sg_path, "w") as f: f.write(patched)
          EOF

      - name: Build Release APK
        script: |
          flutter build apk --release --no-shrink
    artifacts:
      - build/**/outputs/**/*.apk
      - build/**/outputs/**/mapping.txt
      
