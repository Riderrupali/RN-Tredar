workflows:
  android-release:
    name: Android Release Build
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Upgrade dependencies
        script: flutter pub upgrade

      - name: Get Flutter packages
        script: flutter pub get

      - name: Force Re-create Android Folder (v2 Embedding)
        script: |
          rm -rf android
          flutter create --platforms=android .

      - name: Update Compile SDK and Kotlin
        script: |
          # compileSdk 36 वर सेट करण्यासाठी
          sed -i 's/compileSdk = .*/compileSdk = 36/g' android/app/build.gradle || true
          sed -i 's/compileSdkVersion .*/compileSdkVersion 36/g' android/app/build.gradle || true
          
          # कोटलिन व्हर्जन 2.2.0 साठी
          python3 -c 'import re, os; f="android/settings.gradle"; c=open(f).read(); open(f, "w").write(re.sub(r"id\s+[\x27\x22]org\.jetbrains\.kotlin\.android[\x27\x22]\s+version\s+[\x27\x22][^\x27\x22]*[\x27\x22]", "id \"org.jetbrains.kotlin.android\" version \"2.2.0\"", c))'

      - name: Build Release APK
        script: |
          flutter build apk --release --no-shrink
    artifacts:
      - build/**/outputs/**/*.apk
      
