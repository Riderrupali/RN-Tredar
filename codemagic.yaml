workflows:
  android-release:
    name: Android Release Build
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17

    scripts:
      - name: Flutter pub get
        script: flutter pub get

      - name: Generate fresh Android project
        script: flutter create --platforms android .

      - name: Patch Kotlin to 1.9.25 (flutter_tts fix)
        script: |
          cat > /tmp/patch_kotlin.py << 'PYEOF'
          import re, os

          TARGET = "1.9.25"

          targets = [
              "android/settings.gradle",
              "android/settings.gradle.kts",
              "android/build.gradle",
              "android/build.gradle.kts",
          ]

          patched_any = False

          for path in targets:
              if not os.path.exists(path):
                  print(f"  [skip]    {path}")
                  continue

              with open(path, "r") as f:
                  before = f.read()

              after = before

              # Pattern 1: id "org.jetbrains.kotlin.android" version "X.X.X"
              after = re.sub(
                  r'''(id\s+['"]org\.jetbrains\.kotlin\.android['"]\s+version\s+)['"][^'"]*['"]''',
                  lambda m: m.group(1) + f'"{TARGET}"',
                  after
              )

              # Pattern 2: ext.kotlin_version = "X.X.X"
              after = re.sub(
                  r"""(ext\.kotlin_version\s*=\s*)['"][^'"]*['"]""",
                  lambda m: m.group(1) + f'"{TARGET}"',
                  after
              )

              if after != before:
                  with open(path, "w") as f:
                      f.write(after)
                  print(f"  [PATCHED] {path}")
                  patched_any = True
              else:
                  print(f"  [same]    {path}")

              print(open(path).read())
              print("---")

          if patched_any:
              print("\n✅ Kotlin version forced to", TARGET)
          else:
              print("\n⚠️  No file was patched — check gradle files above")
          PYEOF

          python3 /tmp/patch_kotlin.py

      - name: Build Release APK
        script: flutter build apk --release

    artifacts:
      - build/**/outputs/**/*.apk
      - build/**/outputs/**/mapping.txt
