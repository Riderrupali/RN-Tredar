      # ── Step 3: Setup Release Signing ──
      - name: Setup signing
        script: |
          cp keystore/code_magic.jks android/app/code_magic.jks

          cat > android/key.properties << 'EOF'
          storePassword=riderrupali@07
          keyPassword=riderrupali@07
          keyAlias=code_magic_key
          storeFile=code_magic.jks
          EOF

          cat > android/app/build.gradle << 'EOF'
          plugins {
              id "com.android.application"
              id "kotlin-android"
              id "dev.flutter.flutter-gradle-plugin"
          }

          android {
              namespace "com.codemagic.app"
              compileSdk 34
              ndkVersion flutter.ndkVersion

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }

              kotlinOptions {
                  jvmTarget = "1.8"
              }

              defaultConfig {
                  applicationId "com.codemagic.app"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0.0"
              }

              signingConfigs {
                  release {
                      keyAlias "code_magic_key"
                      keyPassword "riderrupali@07"
                      storeFile file("code_magic.jks")
                      storePassword "riderrupali@07"
                  }
              }

              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                      minifyEnabled false
                      shrinkResources false
                  }
              }
          }

          flutter {
              source "../.."
          }
          EOF
          
