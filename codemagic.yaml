workflows:
  android-release:
    name: Code Magic Trading App Release
    max_build_duration: 60

    environment:
      flutter: 3.24.0
      java: 17

    scripts:
      # Step 1
      - name: Generate fresh Android project
        script: |
          flutter create \
            --platforms android \
            --org com.codemagic \
            --project-name code_magic_app \
            .

      # Step 2
      - name: Update Kotlin & Gradle Version
        script: |
          sed -i.bak 's/version "1.7.10"/version "2.1.0"/g' android/settings.gradle || true
          sed -i.bak "s/ext.kotlin_version = .*/ext.kotlin_version = '2.1.0'/g" android/build.gradle || true

          sed -i.bak 's/com.android.tools.build:gradle:7.3.0/com.android.tools.build:gradle:7.3.1/g' android/build.gradle || true
      # Step 3
      - name: Flutter pub get
        script: |
          flutter clean
          rm -rf pubspec.lock
          flutter pub cache clean --force
          flutter pub get

      # Step 4
      - name: Build Release APK
        script: |
          flutter build apk --release

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
