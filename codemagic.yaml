workflows:
  android-release:
    name: Android Release Build
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Upgrade dependencies
        script: flutter pub upgrade

      - name: Get Flutter packages
        script: flutter pub get

      - name: Force Re-create Android Folder (v2 Embedding)
        script: |
          # जुना अँड्रॉइड फोल्डर काढून टाकतोय
          rm -rf android
          # नवीन अँड्रॉइड फोल्डर v2 एम्बेडिंगसह तयार करतोय
          flutter create --platforms=android .

      - name: Update Kotlin Version
        script: |
          # settings.gradle मध्ये कोटलिन व्हर्जन 2.2.0 सेट करतोय
          sed -i 's/id "org.jetbrains.kotlin.android" version ".*"/id "org.jetbrains.kotlin.android" version "2.2.0"/g' android/settings.gradle

      - name: Build Release APK
        script: |
          # 'flutter build apk' कमांड आता नवीन स्ट्रक्चर वापरून बिल्ड करेल
          flutter build apk --release --no-shrink
    artifacts:
      - build/**/outputs/**/*.apk
      
