name: code_magic_app
description: Trading AI Friend - OCR Screen Analysis, Marathi Voice, Knowledge Base
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Voice — Speech to Text
  speech_to_text: ^6.6.0

  # Voice — Text to Speech
  flutter_tts: ^4.2.5

  # Local Database
  sqflite: ^2.3.2
  path: ^1.9.0

  # File Picker
  file_picker: ^8.0.3

  # OCR — Screen Text Reading (offline, ML Kit)
  google_mlkit_text_recognition: ^0.13.0

  # Image Picker
  image_picker: ^1.1.2

  # Screen Overlay (Live mode)
  flutter_overlay_window: ^0.4.2

  # Permissions
  permission_handler: ^11.3.1

  # UI
  cupertino_icons: ^1.0.6
  flutter_animate: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
