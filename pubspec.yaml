name: code_magic_app
description: Trading AI Friend - OCR Screen Analysis, Marathi Voice, Knowledge Base
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Voice — Speech to Text (Updated to latest for Android compatibility)
  speech_to_text: ^7.2.0

  # Voice — Text to Speech
  flutter_tts: 4.0.2

  # Local Database
  sqflite: ^2.3.2
  path: ^1.9.0

  # File Picker
  file_picker: ^8.0.3

  # OCR — Screen Text Reading
  google_mlkit_text_recognition: ^0.13.0

  # Image Picker
  image_picker: ^1.1.2

  # Screen Overlay
  flutter_overlay_window: ^0.4.2

  # Permissions
  permission_handler: ^11.3.1

  # UI
  cupertino_icons: ^1.0.6
  flutter_animate: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  # जर तुझ्याकडे 'assets' फोल्डर नसेल, तर खालील दोन ओळी काढून टाक!
  # assets:
  #   - assets/
  
