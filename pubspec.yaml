name: code_magic_app
description: Trading AI Friend - OCR Screen Analysis, Marathi Voice, Knowledge Base
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0' # SDK व्हर्जन थोडं अपडेट केलंय

dependencies:
  flutter:
    sdk: flutter

  # Voice — Speech to Text (offline)
  speech_to_text: ^7.0.0

  # Voice — Text to Speech (Updated to fix Kotlin compatibility)
  flutter_tts: ^4.3.0 

  # Local Database
  sqflite: ^2.4.0
  path: ^1.9.0

  # File Picker
  file_picker: ^9.0.0

  # OCR — Screen Text Reading
  google_mlkit_text_recognition: ^0.15.0

  # Image Picker
  image_picker: ^1.1.2

  # Screen Overlay
  flutter_overlay_window: ^0.5.0

  # Permissions
  permission_handler: ^11.3.1

  # UI
  cupertino_icons: ^1.0.8
  flutter_animate: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  
